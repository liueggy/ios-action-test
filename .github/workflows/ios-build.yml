name: Build Glass Tasks IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-unsigned-ipa:
    name: Build unsigned Glass Tasks IPA
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner and Xcode info
        run: |
          mkdir -p build-logs
          {
            sw_vers
            xcodebuild -version
            xcode-select -p
            swift --version
            xcrun --sdk iphoneos --show-sdk-path
          } | tee build-logs/environment.txt

      - name: Generate app bundle metadata
        run: |
          mkdir -p build/Payload/GlassTasks.app build-logs
          python3 - <<'PY'
          from pathlib import Path

          plist = r'''<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>GlassTasks</string>
              <key>CFBundleIdentifier</key>
              <string>com.a7OM.9Sqorrj</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>GlassTasks</string>
              <key>CFBundleDisplayName</key>
              <string>Glass Tasks</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>16.0</string>
              <key>UIApplicationSupportsIndirectInputEvents</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
                  <integer>2</integer>
              </array>
              <key>NSCalendarsUsageDescription</key>
              <string>Glass Tasks needs Calendar access to add task due dates to your system calendar.</string>
              <key>NSCalendarsWriteOnlyAccessUsageDescription</key>
              <string>Glass Tasks needs write-only Calendar access to create events for your tasks.</string>
          </dict>
          </plist>
          '''

          Path('build/Payload/GlassTasks.app/Info.plist').write_text(plist, encoding='utf-8')
          PY
          plutil -lint build/Payload/GlassTasks.app/Info.plist | tee build-logs/plutil.txt

      - name: Build unsigned .app for physical iPhone arm64
        run: |
          set -o pipefail
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          SWIFT_COMPILER=$(xcrun --find swiftc)

          $SWIFT_COMPILER \
            -parse-as-library \
            App/*.swift \
            -target arm64-apple-ios16.0 \
            -sdk "$IOS_SDK" \
            -framework UIKit \
            -framework EventKit \
            -emit-executable \
            -o build/Payload/GlassTasks.app/GlassTasks 2>&1 | tee build-logs/swiftc.txt

          chmod +x build/Payload/GlassTasks.app/GlassTasks
          file build/Payload/GlassTasks.app/GlassTasks | tee build-logs/file.txt

          cd build
          zip -qry GlassTasks-unsigned.ipa Payload
          ls -lh GlassTasks-unsigned.ipa | tee ../build-logs/ipa.txt

      - name: Upload unsigned IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GlassTasks-unsigned-ipa
          path: build/GlassTasks-unsigned.ipa
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GlassTasks-build-logs
          path: build-logs
          if-no-files-found: ignore

      - name: Publish IPA to GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: glass-tasks-latest
          name: Glass Tasks unsigned IPA
          body: |
            Glass Tasks unsigned IPA built by GitHub Actions.

            Features:
            - Native UIKit task list
            - Apple HIG-style navigation and dynamic type
            - Glass/material visual style using system blur materials
            - Add tasks with due dates and notes
            - Mark tasks complete/incomplete
            - Add tasks to the system Calendar via EventKit

            Bundle ID: `com.a7OM.9Sqorrj`
            Minimum iOS: `16.0`

            This IPA is unsigned. Re-sign it with your own certificate and provisioning profile before installing.
          files: build/GlassTasks-unsigned.ipa
          prerelease: false
          make_latest: true
