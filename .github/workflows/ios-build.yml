name: Build Tasks IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-unsigned-ipa:
    name: Build unsigned Tasks IPA
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner and Xcode info
        run: |
          mkdir -p build-logs
          {
            sw_vers
            xcodebuild -version
            xcode-select -p
            swift --version
            xcrun --sdk iphoneos --show-sdk-path
          } | tee build-logs/environment.txt

      - name: Generate app bundle metadata
        run: |
          mkdir -p build/Payload/EggTool.app build-logs
          python3 - <<'PY'
          from pathlib import Path

          plist = r'''<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>zh_CN</string>
              <key>CFBundleExecutable</key>
              <string>EggTool</string>
              <key>CFBundleIdentifier</key>
              <string>com.a7OM.9Sqorrj</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>Egg Tool</string>
              <key>CFBundleDisplayName</key>
              <string>Egg Tool</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>3.1</string>
              <key>CFBundleVersion</key>
              <string>4</string>
              <key>CFBundleIcons</key>
              <dict>
                  <key>CFBundlePrimaryIcon</key>
                  <dict>
                      <key>CFBundleIconFiles</key>
                      <array>
                          <string>AppIcon60x60</string>
                      </array>
                      <key>UIPrerenderedIcon</key>
                      <false/>
                  </dict>
              </dict>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
              <key>UIApplicationSupportsIndirectInputEvents</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
                  <integer>2</integer>
              </array>
              <key>NSCalendarsWriteOnlyAccessUsageDescription</key>
              <string>Egg Tool 需要日历写入权限，以便把任务同步到你的系统日历。</string>
          </dict>
          </plist>
          '''

          Path('build/Payload/EggTool.app/Info.plist').write_text(plist, encoding='utf-8')
          PY
          plutil -lint build/Payload/EggTool.app/Info.plist | tee build-logs/plutil.txt

      - name: Copy optional app icons
        run: |
          set -e
          ICON_DIR="App/Assets/AppIcon"
          APP_DIR="build/Payload/EggTool.app"
          mkdir -p build-logs

          echo "Looking for custom icons in $ICON_DIR" | tee build-logs/icons.txt

          if [ -f "$ICON_DIR/AppIcon60x60@2x.png" ]; then
            cp "$ICON_DIR/AppIcon60x60@2x.png" "$APP_DIR/AppIcon60x60@2x.png"
            echo "Included AppIcon60x60@2x.png" | tee -a build-logs/icons.txt
          else
            echo "Missing AppIcon60x60@2x.png, app will use default icon behavior." | tee -a build-logs/icons.txt
          fi

          if [ -f "$ICON_DIR/AppIcon60x60@3x.png" ]; then
            cp "$ICON_DIR/AppIcon60x60@3x.png" "$APP_DIR/AppIcon60x60@3x.png"
            echo "Included AppIcon60x60@3x.png" | tee -a build-logs/icons.txt
          else
            echo "Missing AppIcon60x60@3x.png, app will use default icon behavior." | tee -a build-logs/icons.txt
          fi

          find "$APP_DIR" -maxdepth 1 -name 'AppIcon*.png' -print | tee -a build-logs/icons.txt

      - name: Build unsigned UIKit app for physical iPhone arm64
        run: |
          set -o pipefail
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          SWIFT_COMPILER=$(xcrun --find swiftc)

          echo "SDK: $IOS_SDK" | tee build-logs/sdk.txt
          echo "Compiler: $SWIFT_COMPILER" | tee -a build-logs/sdk.txt

          $SWIFT_COMPILER \
            -parse-as-library \
            App/*.swift \
            -target arm64-apple-ios17.0 \
            -sdk "$IOS_SDK" \
            -framework UIKit \
            -framework SwiftUI \
            -framework EventKit \
            -framework PhotosUI \
            -framework Vision \
            -framework CoreImage \
            -framework UniformTypeIdentifiers \
            -framework Network \
            -framework QuickLook \
            -framework Combine \
            -emit-executable \
            -O \
            -o build/Payload/EggTool.app/EggTool 2>&1 | tee build-logs/swiftc.txt

          chmod +x build/Payload/EggTool.app/EggTool
          file build/Payload/EggTool.app/EggTool | tee build-logs/file.txt

      - name: Package unsigned IPA
        run: |
          cd build
          zip -qry EggTool-unsigned.ipa Payload
          ls -lh EggTool-unsigned.ipa | tee ../build-logs/ipa.txt

      - name: Upload unsigned IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: EggTool-unsigned-ipa
          path: build/EggTool-unsigned.ipa
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: EggTool-build-logs
          path: build-logs
          if-no-files-found: ignore

      - name: Publish IPA to GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: glass-tasks-v3
          name: "Egg Tool v0.4 - unsigned IPA"
          body: |
            Egg Tool v0.4 unsigned IPA built by GitHub Actions.

            ## 当前版本
            - 新增 SSH 工具：主机管理、端口连通性测试、ssh/scp 命令生成、ssh:// 调起外部客户端
            - 增强阅读器：补齐常见代码/配置文件格式，识别 EPUB/MOBI/AZW/CBZ 等电子书
            - 新增阅读器：导入 TXT/Markdown/JSON/代码/图片/PDF/Office 等多格式文件，支持内置阅读和 Quick Look 预览
            - 新增数据备份：任务、笔记、链接统一 JSON 导出和导入恢复
            - 新增 OCR 工具：从相册选择图片，本地识别中英文文字，复制/分享结果
            - 新增二维码工具：文本/链接生成二维码、复制图片、分享图片
            - 新增链接收藏：保存网页/资料链接、搜索、置顶、打开、复制、分享
            - 新增快速笔记：本地记录、搜索、置顶、复制、分享
            - 新增文本工具：字数统计、URL 编解码、Base64 编解码、JSON 格式化、UUID、时间戳
            - 项目名升级为 Egg Tool
            - 新增“今日”仪表盘：首页展示问候、任务概览、快速入口和接下来任务
            - 新增“工具箱”宫格：电话、短信、邮件、网页、地图、日历、摘要分享等入口
            - 保留任务管理、日历写入、外观模式、强调色、学习/工作/生活/默认模式
            - 预留文本工具、OCR、二维码等后续扩展入口
            - 使用 UIKit 原生组件和明暗主题自适应卡片设计
            - Bundle ID: `com.a7OM.9Sqorrj`
            - Minimum iOS: `17.0`

            This IPA is unsigned. Re-sign with your own certificate and provisioning profile before installing.
          files: build/EggTool-unsigned.ipa
          prerelease: false
          make_latest: true
          overwrite_files: true
