name: Build Glass Tasks IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-unsigned-ipa:
    name: Build unsigned Glass Tasks IPA (SwiftUI)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner and Xcode info
        run: |
          mkdir -p build-logs
          {
            sw_vers
            xcodebuild -version
            xcode-select -p
            swift --version
            xcrun --sdk iphoneos --show-sdk-path
            ls /Applications/ | grep Xcode || true
          } | tee build-logs/environment.txt

      - name: Select latest Xcode
        run: |
          # Use the latest available Xcode on the runner
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST_XCODE" ]; then
            sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
            echo "Selected: $LATEST_XCODE"
          fi
          xcodebuild -version | tee -a build-logs/environment.txt

      - name: Generate Info.plist
        run: |
          mkdir -p build/Payload/GlassTasks.app build-logs
          python3 - <<'PY'
          from pathlib import Path

          plist = r'''<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>GlassTasks</string>
              <key>CFBundleIdentifier</key>
              <string>com.a7OM.9Sqorrj</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>GlassTasks</string>
              <key>CFBundleDisplayName</key>
              <string>Glass Tasks</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>2.0</string>
              <key>CFBundleVersion</key>
              <string>2</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
              <key>UIApplicationSupportsIndirectInputEvents</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
                  <integer>2</integer>
              </array>
              <key>NSCalendarsUsageDescription</key>
              <string>Glass Tasks needs Calendar access to add task due dates to your system calendar.</string>
              <key>NSCalendarsWriteOnlyAccessUsageDescription</key>
              <string>Glass Tasks needs write-only Calendar access to create events for your tasks.</string>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
              </dict>
          </dict>
          </plist>
          '''

          Path('build/Payload/GlassTasks.app/Info.plist').write_text(plist, encoding='utf-8')
          PY
          plutil -lint build/Payload/GlassTasks.app/Info.plist | tee build-logs/plutil.txt

      - name: Build SwiftUI app for arm64 iPhone
        run: |
          set -o pipefail
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          SWIFT_COMPILER=$(xcrun --find swiftc)

          echo "SDK: $IOS_SDK"
          echo "Compiler: $SWIFT_COMPILER"

          $SWIFT_COMPILER \
            -parse-as-library \
            App/*.swift \
            -target arm64-apple-ios17.0 \
            -sdk "$IOS_SDK" \
            -framework SwiftUI \
            -framework UIKit \
            -framework EventKit \
            -framework Combine \
            -emit-executable \
            -O \
            -o build/Payload/GlassTasks.app/GlassTasks 2>&1 | tee build-logs/swiftc.txt

          chmod +x build/Payload/GlassTasks.app/GlassTasks
          file build/Payload/GlassTasks.app/GlassTasks | tee build-logs/file.txt

      - name: Package unsigned IPA
        run: |
          cd build
          zip -qry GlassTasks-unsigned.ipa Payload
          ls -lh GlassTasks-unsigned.ipa | tee ../build-logs/ipa.txt

      - name: Upload unsigned IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GlassTasks-unsigned-ipa
          path: build/GlassTasks-unsigned.ipa
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GlassTasks-build-logs
          path: build-logs
          if-no-files-found: ignore

      - name: Publish IPA to GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: glass-tasks-v2
          name: "Glass Tasks v2.0 - SwiftUI + Liquid Glass"
          body: |
            Glass Tasks v2.0 - Complete SwiftUI rewrite with iOS 26 Liquid Glass support.

            ## What's New
            - Full SwiftUI implementation (NavigationStack, Form, List)
            - Standard controls (Slider, Toggle, Picker) that automatically adopt Liquid Glass on iOS 26
            - Priority system with visual slider
            - Improved task management with filter tabs
            - Symbol effects and spring animations
            - Material-based stat cards
            - EventKit calendar integration with smart reminders

            ## iOS 26 Liquid Glass
            When running on iOS 26, the following elements automatically get Liquid Glass appearance:
            - Navigation bar
            - Segmented picker
            - Slider knob (the smooth glass animation you wanted)
            - Toggle switch
            - Sheet presentations
            - Toolbar buttons

            ## Info
            - Bundle ID: `com.a7OM.9Sqorrj`
            - Minimum iOS: `17.0`
            - Architecture: `arm64`
            - Framework: SwiftUI + EventKit

            This IPA is unsigned. Re-sign with your certificate and provisioning profile before installing.
          files: build/GlassTasks-unsigned.ipa
          prerelease: false
          make_latest: true
