name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    name: Build unsigned IPA on macOS
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner and Xcode info
        run: |
          mkdir -p build-logs
          {
            sw_vers
            xcodebuild -version
            xcode-select -p
            swift --version
            xcrun --sdk iphoneos --show-sdk-path
          } | tee build-logs/environment.txt

      - name: Generate minimal iOS app files
        run: |
          mkdir -p GeneratedApp build/Payload/IOSActionTest.app build-logs
          python3 - <<'PY'
          from pathlib import Path

          swift = r'''import UIKit

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?

              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  let window = UIWindow(frame: UIScreen.main.bounds)
                  let vc = UIViewController()
                  vc.view.backgroundColor = UIColor.systemBackground

                  let label = UILabel()
                  label.text = "Hello from GitHub Actions unsigned IPA"
                  label.textAlignment = .center
                  label.font = UIFont.systemFont(ofSize: 22, weight: .semibold)
                  label.numberOfLines = 0
                  label.translatesAutoresizingMaskIntoConstraints = false

                  vc.view.addSubview(label)
                  NSLayoutConstraint.activate([
                      label.centerXAnchor.constraint(equalTo: vc.view.centerXAnchor),
                      label.centerYAnchor.constraint(equalTo: vc.view.centerYAnchor),
                      label.leadingAnchor.constraint(greaterThanOrEqualTo: vc.view.leadingAnchor, constant: 24),
                      label.trailingAnchor.constraint(lessThanOrEqualTo: vc.view.trailingAnchor, constant: -24)
                  ])

                  window.rootViewController = vc
                  window.makeKeyAndVisible()
                  self.window = window
                  return true
              }
          }
          '''

          plist = r'''<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleExecutable</key>
              <string>IOSActionTest</string>
              <key>CFBundleIdentifier</key>
              <string>com.liueggy.iosactiontest</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>IOSActionTest</string>
              <key>CFBundleDisplayName</key>
              <string>iOS Action Test</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>16.0</string>
              <key>UIApplicationSupportsIndirectInputEvents</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          '''

          Path('GeneratedApp/AppDelegate.swift').write_text(swift, encoding='utf-8')
          Path('build/Payload/IOSActionTest.app/Info.plist').write_text(plist, encoding='utf-8')
          PY
          plutil -lint build/Payload/IOSActionTest.app/Info.plist | tee build-logs/plutil.txt

      - name: Build unsigned .app for physical iPhone arm64
        run: |
          set -o pipefail
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          SWIFT_COMPILER=$(xcrun --find swiftc)

          $SWIFT_COMPILER \
            -parse-as-library \
            GeneratedApp/AppDelegate.swift \
            -target arm64-apple-ios16.0 \
            -sdk "$IOS_SDK" \
            -framework UIKit \
            -emit-executable \
            -o build/Payload/IOSActionTest.app/IOSActionTest 2>&1 | tee build-logs/swiftc.txt

          chmod +x build/Payload/IOSActionTest.app/IOSActionTest
          file build/Payload/IOSActionTest.app/IOSActionTest | tee build-logs/file.txt

          cd build
          zip -qry IOSActionTest-unsigned.ipa Payload
          ls -lh IOSActionTest-unsigned.ipa | tee ../build-logs/ipa.txt

      - name: Upload unsigned IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: IOSActionTest-unsigned-ipa
          path: build/IOSActionTest-unsigned.ipa
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: IOSActionTest-build-logs
          path: build-logs
          if-no-files-found: ignore
