name: Build Glass Tasks IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-unsigned-ipa:
    name: Build unsigned Glass Tasks IPA (SwiftUI)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          mkdir -p build-logs
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST_XCODE" ]; then
            sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          fi
          {
            sw_vers
            xcodebuild -version
            swift --version
          } | tee build-logs/environment.txt

      - name: Generate Xcode project
        run: |
          # Create a minimal Swift Package that builds as an iOS app
          cat > Package.swift << 'EOF'
          // swift-tools-version:5.9
          import PackageDescription
          let package = Package(
              name: "GlassTasks",
              platforms: [.iOS(.v17)],
              targets: [
                  .executableTarget(
                      name: "GlassTasks",
                      path: "App",
                      linkerSettings: [
                          .linkedFramework("UIKit"),
                          .linkedFramework("SwiftUI"),
                          .linkedFramework("EventKit"),
                      ]
                  )
              ]
          )
          EOF

          # Resolve dependencies
          swift package resolve 2>&1 | tee build-logs/resolve.txt || true

      - name: Build for iOS device (arm64)
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme GlassTasks \
            -destination 'generic/platform=iOS' \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PRODUCT_BUNDLE_IDENTIFIER=com.a7OM.9Sqorrj \
            MARKETING_VERSION=2.0 \
            CURRENT_PROJECT_VERSION=2 \
            INFOPLIST_KEY_CFBundleDisplayName="Glass Tasks" \
            INFOPLIST_KEY_LSApplicationCategoryType="public.app-category.productivity" \
            INFOPLIST_KEY_NSCalendarsUsageDescription="Glass Tasks needs Calendar access to add task due dates." \
            INFOPLIST_KEY_UIApplicationSceneManifest_Generation=YES \
            INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents=YES \
            INFOPLIST_KEY_UILaunchScreen_Generation=YES \
            INFOPLIST_KEY_UISupportedInterfaceOrientations="UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight" \
            GENERATE_INFOPLIST_FILE=YES \
            SWIFT_EMIT_LOC_STRINGS=YES \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            2>&1 | tee build-logs/xcodebuild.txt

      - name: Package unsigned IPA
        run: |
          # Find the .app bundle
          APP_PATH=$(find build/DerivedData -name "GlassTasks.app" -type d | grep -v "__" | head -1)
          echo "Found app at: $APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found"
            find build/DerivedData -name "*.app" -type d | tee build-logs/find-app.txt
            exit 1
          fi

          file "$APP_PATH/GlassTasks" | tee build-logs/file.txt

          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          cd build
          zip -qry GlassTasks-unsigned.ipa Payload
          ls -lh GlassTasks-unsigned.ipa | tee ../build-logs/ipa.txt

      - name: Upload unsigned IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GlassTasks-unsigned-ipa
          path: build/GlassTasks-unsigned.ipa
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GlassTasks-build-logs
          path: build-logs
          if-no-files-found: ignore

      - name: Publish IPA to GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: glass-tasks-v2
          name: "Glass Tasks v2.0 - SwiftUI + Liquid Glass"
          body: |
            Glass Tasks v2.0 - Complete SwiftUI rewrite with iOS 26 Liquid Glass support.

            ## What's New
            - Full SwiftUI implementation (NavigationStack, Form, List)
            - Standard controls (Slider, Toggle, Picker) that automatically adopt Liquid Glass on iOS 26
            - Priority system with visual slider
            - Improved task management with filter tabs
            - Symbol effects and spring animations
            - Material-based stat cards
            - EventKit calendar integration with smart reminders

            ## iOS 26 Liquid Glass
            When running on iOS 26, these elements automatically get Liquid Glass:
            - Navigation bar
            - Segmented picker
            - Slider knob (smooth glass animation)
            - Toggle switch
            - Sheet presentations
            - Toolbar buttons

            ## Info
            - Bundle ID: `com.a7OM.9Sqorrj`
            - Minimum iOS: `17.0`
            - Architecture: `arm64`
            - Framework: SwiftUI + EventKit

            Unsigned IPA. Re-sign with your certificate before installing.
          files: build/GlassTasks-unsigned.ipa
          prerelease: false
          make_latest: true
