name: Build Tasks IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-unsigned-ipa:
    name: Build unsigned Tasks IPA
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner and Xcode info
        run: |
          mkdir -p build-logs
          {
            sw_vers
            xcodebuild -version
            xcode-select -p
            swift --version
            xcrun --sdk iphoneos --show-sdk-path
          } | tee build-logs/environment.txt

      - name: Generate app bundle metadata
        run: |
          mkdir -p build/Payload/GlassTasks.app build-logs
          python3 - <<'PY'
          from pathlib import Path

          plist = r'''<?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>zh_CN</string>
              <key>CFBundleExecutable</key>
              <string>GlassTasks</string>
              <key>CFBundleIdentifier</key>
              <string>com.a7OM.9Sqorrj</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>GlassTasks</string>
              <key>CFBundleDisplayName</key>
              <string>玻璃待办</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>3.1</string>
              <key>CFBundleVersion</key>
              <string>4</string>
              <key>CFBundleIcons</key>
              <dict>
                  <key>CFBundlePrimaryIcon</key>
                  <dict>
                      <key>CFBundleIconFiles</key>
                      <array>
                          <string>AppIcon60x60</string>
                      </array>
                      <key>UIPrerenderedIcon</key>
                      <false/>
                  </dict>
              </dict>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>MinimumOSVersion</key>
              <string>17.0</string>
              <key>UIApplicationSupportsIndirectInputEvents</key>
              <true/>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
                  <string>UIInterfaceOrientationLandscapeLeft</string>
                  <string>UIInterfaceOrientationLandscapeRight</string>
              </array>
              <key>UIDeviceFamily</key>
              <array>
                  <integer>1</integer>
                  <integer>2</integer>
              </array>
              <key>NSCalendarsWriteOnlyAccessUsageDescription</key>
              <string>玻璃待办需要日历写入权限，以便把任务同步到你的系统日历。</string>
          </dict>
          </plist>
          '''

          Path('build/Payload/GlassTasks.app/Info.plist').write_text(plist, encoding='utf-8')
          PY
          plutil -lint build/Payload/GlassTasks.app/Info.plist | tee build-logs/plutil.txt

      - name: Copy optional app icons
        run: |
          set -e
          ICON_DIR="App/Assets/AppIcon"
          APP_DIR="build/Payload/GlassTasks.app"
          mkdir -p build-logs

          echo "Looking for custom icons in $ICON_DIR" | tee build-logs/icons.txt

          if [ -f "$ICON_DIR/AppIcon60x60@2x.png" ]; then
            cp "$ICON_DIR/AppIcon60x60@2x.png" "$APP_DIR/AppIcon60x60@2x.png"
            echo "Included AppIcon60x60@2x.png" | tee -a build-logs/icons.txt
          else
            echo "Missing AppIcon60x60@2x.png, app will use default icon behavior." | tee -a build-logs/icons.txt
          fi

          if [ -f "$ICON_DIR/AppIcon60x60@3x.png" ]; then
            cp "$ICON_DIR/AppIcon60x60@3x.png" "$APP_DIR/AppIcon60x60@3x.png"
            echo "Included AppIcon60x60@3x.png" | tee -a build-logs/icons.txt
          else
            echo "Missing AppIcon60x60@3x.png, app will use default icon behavior." | tee -a build-logs/icons.txt
          fi

          find "$APP_DIR" -maxdepth 1 -name 'AppIcon*.png' -print | tee -a build-logs/icons.txt

      - name: Build unsigned UIKit app for physical iPhone arm64
        run: |
          set -o pipefail
          IOS_SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          SWIFT_COMPILER=$(xcrun --find swiftc)

          echo "SDK: $IOS_SDK" | tee build-logs/sdk.txt
          echo "Compiler: $SWIFT_COMPILER" | tee -a build-logs/sdk.txt

          $SWIFT_COMPILER \
            -parse-as-library \
            App/*.swift \
            -target arm64-apple-ios17.0 \
            -sdk "$IOS_SDK" \
            -framework UIKit \
            -framework EventKit \
            -framework Combine \
            -emit-executable \
            -O \
            -o build/Payload/GlassTasks.app/GlassTasks 2>&1 | tee build-logs/swiftc.txt

          chmod +x build/Payload/GlassTasks.app/GlassTasks
          file build/Payload/GlassTasks.app/GlassTasks | tee build-logs/file.txt

      - name: Package unsigned IPA
        run: |
          cd build
          zip -qry GlassTasks-unsigned.ipa Payload
          ls -lh GlassTasks-unsigned.ipa | tee ../build-logs/ipa.txt

      - name: Upload unsigned IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: GlassTasks-unsigned-ipa
          path: build/GlassTasks-unsigned.ipa
          if-no-files-found: error

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: GlassTasks-build-logs
          path: build-logs
          if-no-files-found: ignore

      - name: Publish IPA to GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: glass-tasks-v3
          name: "玻璃待办 v3.1 - unsigned IPA"
          body: |
            玻璃待办 v3.1 unsigned IPA built by GitHub Actions.

            ## 当前版本
            - 使用稳定的 UIKit 系统控件
            - 不包含液态玻璃专用代码
            - 支持待办、总览、今日、逾期、摘要分享
            - 支持快捷操作：电话、短信、邮件、网页、地图、日历、系统设置
            - 支持设置页：外观模式、强调色、学习/工作/生活/默认模式
            - 预留应用图标目录：`App/Assets/AppIcon/`
            - 可上传：`AppIcon60x60@2x.png` 和 `AppIcon60x60@3x.png`
            - Bundle ID: `com.a7OM.9Sqorrj`
            - Minimum iOS: `17.0`

            This IPA is unsigned. Re-sign with your own certificate and provisioning profile before installing.
          files: build/GlassTasks-unsigned.ipa
          prerelease: false
          make_latest: true
          overwrite_files: true
